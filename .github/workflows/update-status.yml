name: Update fuel status json

on:
  workflow_dispatch:
  schedule:
    - cron: "3,8,13,18,23,28,33,38,43,48,53,58 * * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Generate status.json
        run: |
          python - <<'PY'
          import csv
          import json
          from pathlib import Path

          fuel_path = Path("fuel-status-source.json")
          crowd_path = Path("crowdsource-source.csv")
          out_path = Path("status.json")

          base = json.loads(fuel_path.read_text(encoding="utf-8"))
          stations = base.get("stations", [])

          crowd_latest = {}

          if crowd_path.exists():
              with crowd_path.open("r", encoding="utf-8-sig", newline="") as f:
                  reader = csv.DictReader(f)
                  for row in reader:
                      key = (row.get("station_key") or "").strip().lower()
                      ts = (row.get("timestamp") or "").strip()
                      if not key:
                          continue
                      existing = crowd_latest.get(key)
                      if not existing or ts >= existing.get("timestamp", ""):
                          crowd_latest[key] = row

          merged = []
          for station in stations:
              station_key = (station.get("stationKey") or "").strip().lower()
              crowd = crowd_latest.get(station_key)
              merged_station = dict(station)

              if crowd:
                  merged_station["updatedAt"] = crowd.get("timestamp") or station.get("updatedAt")
                  merged_station["fuels"] = {
                      "gasohol95": crowd.get("gasohol95") or station["fuels"].get("gasohol95", "unknown"),
                      "gasohol91": crowd.get("gasohol91") or station["fuels"].get("gasohol91", "unknown"),
                      "dieselB7": crowd.get("dieselB7") or station["fuels"].get("dieselB7", "unknown"),
                      "dieselB10": crowd.get("dieselB10") or station["fuels"].get("dieselB10", "unknown"),
                      "diesel": crowd.get("diesel") or station["fuels"].get("diesel", "unknown")
                  }
                  merged_station["crowdsource"] = {
                      "enabled": True,
                      "reporter": crowd.get("reporter", ""),
                      "source": "crowdsource-source.csv"
                  }
              else:
                  merged_station["crowdsource"] = {
                      "enabled": False,
                      "reporter": "",
                      "source": "fuel-status-source.json"
                  }

              merged.append(merged_station)

          result = {
              "meta": {
                  "updatedBy": base.get("updatedBy", "NaraMawin"),
                  "generatedBy": "GitHub Actions",
                  "version": "pro-plus-crowdsource",
                  "schedule": "every ~5 minutes"
              },
              "stations": merged
          }

          out_path.write_text(
              json.dumps(result, ensure_ascii=False, indent=2),
              encoding="utf-8"
          )

          print("status.json updated")
          PY

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add status.json
          git diff --cached --quiet || git commit -m "Auto update status.json"
          git push
