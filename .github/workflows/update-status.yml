name: Update fuel status json

on:
  workflow_dispatch:
  schedule:
    - cron: "3,8,13,18,23,28,33,38,43,48,53,58 * * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Generate status.json from base + crowdsource
        env:
          APPS_SCRIPT_URL: "https://script.google.com/macros/s/AKfycbwGtU2fRx6Mblya9JwFY_C3cfbZgJJHynlMKa_XDdptvy9ObsVufhqHOE4JpDAwYRbS/exec"
        run: |
          python - <<'PY'
          import json
          import urllib.request
          from pathlib import Path

          fuel_path = Path("fuel-status-source.json")
          out_path = Path("status.json")

          base = json.loads(fuel_path.read_text(encoding="utf-8"))
          stations = base.get("stations", [])

          url = __import__("os").environ.get("APPS_SCRIPT_URL", "").strip()
          crowd_rows = []

          if url:
              with urllib.request.urlopen(url, timeout=30) as resp:
                  crowd_rows = json.loads(resp.read().decode("utf-8"))

          latest = {}
          for row in crowd_rows:
              key = str(row.get("station_key", "")).strip().lower()
              ts = str(row.get("Timestamp", row.get("timestamp", ""))).strip()
              if not key:
                  continue
              prev = latest.get(key)
              if not prev or ts >= str(prev.get("Timestamp", prev.get("timestamp", ""))):
                  latest[key] = row

          merged = []
          for station in stations:
              station_key = str(station.get("stationKey", "")).strip().lower()
              crowd = latest.get(station_key)
              merged_station = dict(station)

              if crowd:
                  merged_station["updatedAt"] = (
                      crowd.get("Timestamp")
                      or crowd.get("timestamp")
                      or station.get("updatedAt")
                  )
                  merged_station["fuels"] = {
                      "gasohol95": str(crowd.get("gasohol95", "")).strip() or station["fuels"].get("gasohol95", "unknown"),
                      "gasohol91": str(crowd.get("gasohol91", "")).strip() or station["fuels"].get("gasohol91", "unknown"),
                      "dieselB7": str(crowd.get("dieselB7", "")).strip() or station["fuels"].get("dieselB7", "unknown"),
                      "dieselB10": str(crowd.get("dieselB10", "")).strip() or station["fuels"].get("dieselB10", "unknown"),
                      "diesel": str(crowd.get("diesel", "")).strip() or station["fuels"].get("diesel", "unknown")
                  }
                  merged_station["crowdsource"] = {
                      "enabled": True,
                      "reporter": str(crowd.get("reporter", "")).strip(),
                      "source": "google-form"
                  }
              else:
                  merged_station["crowdsource"] = {
                      "enabled": False,
                      "reporter": "",
                      "source": "fuel-status-source.json"
                  }

              merged.append(merged_station)

          result = {
              "meta": {
                  "updatedBy": base.get("updatedBy", "NaraMawin"),
                  "generatedBy": "GitHub Actions",
                  "version": "pro-plus-crowdsource",
                  "schedule": "every ~5 minutes"
              },
              "stations": merged
          }

          out_path.write_text(
              json.dumps(result, ensure_ascii=False, indent=2),
              encoding="utf-8"
          )
          print("status.json updated")
          PY

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add status.json
          git diff --cached --quiet || git commit -m "Auto update status.json"
          git push
