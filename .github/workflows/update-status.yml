name: Update fuel status json

on:
  workflow_dispatch:
  schedule:
    - cron: "3,8,13,18,23,28,33,38,43,48,53,58 * * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Generate status.json from Google Form
        env:
          APPS_SCRIPT_URL: "https://script.google.com/macros/s/AKfycbwGtU2fRx6Mblya9JwFY_C3cfbZgJJHynlMKa_XDdptvy9ObsVufhqHOE4JpDAwYRbS/exec"
        run: |
          python - <<'PY'
          import json
          import urllib.request
          from pathlib import Path
          import os

          base = json.loads(Path("fuel-status-source.json").read_text(encoding="utf-8"))
          stations = base.get("stations", [])

          url = os.environ.get("APPS_SCRIPT_URL", "")
          rows = []

          if url:
              with urllib.request.urlopen(url, timeout=30) as resp:
                  rows = json.loads(resp.read().decode("utf-8"))

          latest = {}

          for r in rows:
              key = str(r.get("station_key","")).lower().strip()
              ts = str(r.get("Timestamp", r.get("timestamp","")))
              if not key: continue

              if key not in latest or ts >= latest[key].get("Timestamp",""):
                  latest[key] = r

          merged = []

          for s in stations:
              key = s.get("stationKey","").lower()
              crowd = latest.get(key)

              new = dict(s)

              if crowd:
                  new["fuels"] = {
                      "gasohol95": crowd.get("gasohol95","unknown"),
                      "gasohol91": crowd.get("gasohol91","unknown"),
                      "dieselB7": crowd.get("dieselB7","unknown"),
                      "dieselB10": crowd.get("dieselB10","unknown"),
                      "diesel": crowd.get("diesel","unknown")
                  }

                  new["updatedAt"] = crowd.get("Timestamp","")

                  new["crowd"] = {
                      "by": crowd.get("reporter",""),
                      "source": "google-form"
                  }

              merged.append(new)

          result = {
              "meta":{
                  "system":"Fuel Finder PRO+",
                  "owner":"NaraMawin",
                  "update":"auto 5 min"
              },
              "stations": merged
          }

          Path("status.json").write_text(
              json.dumps(result, indent=2, ensure_ascii=False),
              encoding="utf-8"
          )

          print("DONE")
          PY

      - name: Commit & push
        run: |
          git config user.name "bot"
          git config user.email "bot@github.com"
          git add status.json
          git diff --cached --quiet || git commit -m "auto update"
          git push
