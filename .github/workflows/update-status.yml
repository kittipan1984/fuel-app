name: update-status

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write

jobs:
  build-status:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate status.json
        run: |
          python - <<'PY'
          import csv
          import json
          from datetime import datetime, timezone, timedelta
          from pathlib import Path

          fuel_path = Path("fuel-status-source.json")
          crowd_path = Path("crowdsource-source.csv")
          out_path = Path("status.json")

          if not fuel_path.exists():
              raise FileNotFoundError("fuel-status-source.json not found")

          with fuel_path.open("r", encoding="utf-8") as f:
              fuel_data = json.load(f)

          stations = fuel_data.get("stations", [])
          if not isinstance(stations, list):
              raise ValueError("fuel-status-source.json: stations must be a list")

          crowd_map = {}
          if crowd_path.exists():
              with crowd_path.open("r", encoding="utf-8-sig", newline="") as f:
                  reader = csv.DictReader(f)
                  for row in reader:
                      name = (row.get("station_name") or "").strip()
                      if not name:
                          continue
                      enabled = str(row.get("enabled", "")).strip().lower() == "true"
                      confidence = int(float(row.get("confidence") or 0))
                      sample_size = int(float(row.get("sample_size") or 0))
                      reporters_raw = (row.get("reporters") or "").strip()
                      reporters = [x.strip() for x in reporters_raw.split("|") if x.strip()]
                      crowd_map[name] = {
                          "enabled": enabled,
                          "confidence": confidence,
                          "sampleSize": sample_size,
                          "reporters": reporters
                      }

          merged = []
          for item in stations:
              name = item.get("name", "").strip()
              merged.append({
                  "name": name,
                  "matchKeys": item.get("matchKeys", []),
                  "fuels": {
                      "gasohol95": item.get("fuels", {}).get("gasohol95", "unknown"),
                      "gasohol91": item.get("fuels", {}).get("gasohol91", "unknown"),
                      "dieselB7": item.get("fuels", {}).get("dieselB7", "unknown"),
                      "dieselB10": item.get("fuels", {}).get("dieselB10", "unknown"),
                      "diesel": item.get("fuels", {}).get("diesel", "unknown")
                  },
                  "crowdsource": crowd_map.get(name, {
                      "enabled": False,
                      "confidence": 0,
                      "sampleSize": 0,
                      "reporters": []
                  })
              })

          bkk = timezone(timedelta(hours=7))
          now_bkk = datetime.now(bkk).strftime("%Y-%m-%d %H:%M BKK")

          output = {
              "meta": {
                  "source": "generated from fuel-status-source.json + crowdsource-source.csv",
                  "version": "1.0.0",
                  "lastUpdatedBkk": now_bkk,
                  "notes": "Generated by GitHub Actions"
              },
              "stations": merged
          }

          with out_path.open("w", encoding="utf-8") as f:
              json.dump(output, f, ensure_ascii=False, indent=2)

          print("status.json updated successfully")
          PY

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add status.json
          git diff --cached --quiet || git commit -m "chore: update status.json"
          git push
