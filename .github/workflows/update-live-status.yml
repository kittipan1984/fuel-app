name: Update Fuel Status

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch DOEB data
        run: |
          curl -L "YOUR_GOOGLE_SCRIPT_URL" -o fuel-status-source.json

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build live-status.json
        run: node build-live-status.mjs

      - name: Commit & push
        run: |
          git config user.name "bot"
          git config user.email "bot@github.com"
          git add live-status.json fuel-status-source.json
          git commit -m "auto update fuel status" || echo "no changes"
          git push
