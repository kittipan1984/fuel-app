name: Update Fuel Status

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Debug repo files
        run: |
          pwd
          ls -la
          echo "---- scripts ----"
          ls -la scripts || true

      - name: Fetch DOEB data (FORCE JSON)
        run: |
          curl -L --fail --silent --show-error \
          "${{ secrets.DOEB_API }}?province=ปทุมธานี" \
          -o fuel-status-source.json

    echo "---- RESPONSE ----"
    head -n 20 fuel-status-source.json

      - name: Build live-status.json
        run: node scripts/build-live-status.mjs

      - name: Show live-status.json
        run: |
          echo "---- live-status ----"
          head -n 50 live-status.json || true

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add fuel-status-source.json live-status.json
          git diff --cached --quiet || git commit -m "update fuel status"
          git push
