name: Update Fuel Status (PRO MAX++)

on:
  schedule:
    - cron: "*/5 * * * *"   # ทุก 5 นาที
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: Checkout repo
        uses: actions/checkout@v5

      # 2. Setup Node (รองรับอนาคต)
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      # 3. Debug structure
      - name: Debug repo structure
        run: |
          echo "PWD:"
          pwd
          echo "FILES:"
          ls -la
          echo "SCRIPTS:"
          ls -la scripts || true

      # 4. Debug Secret (ตรวจ newline / space)
      - name: Debug DOEB_API length
        run: |
          echo "Length:"
          echo "${{ secrets.DOEB_API }}" | wc -c

      # 5. Fetch GAS (ตัวสำคัญที่สุด)
      - name: Fetch DOEB data (FORCE JSON)
        run: |
          echo "Calling API..."
          curl -L --fail --silent --show-error \
            "${{ secrets.DOEB_API }}?province=%E0%B8%9B%E0%B8%97%E0%B8%B8%E0%B8%A1%E0%B8%98%E0%B8%B2%E0%B8%99%E0%B8%B5"
            -o fuel-status-source.json

          echo "---- RESPONSE HEAD ----"
          head -n 20 fuel-status-source.json || true

      # 6. Validate JSON (กัน HTML หลุด)
      - name: Validate JSON
        run: |
          if grep -q "<!DOCTYPE" fuel-status-source.json; then
            echo "❌ ERROR: Got HTML instead of JSON"
            exit 1
          fi
          echo "✅ JSON looks valid"

      # 7. Build live-status.json
      - name: Build live-status.json
        run: node scripts/build-live-status.mjs

      # 8. Show output
      - name: Preview live-status.json
        run: |
          echo "---- LIVE STATUS ----"
          head -n 50 live-status.json || true

      # 9. Commit & push
      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add fuel-status-source.json live-status.json

          git diff --cached --quiet || git commit -m "chore: update fuel status"

          git push
