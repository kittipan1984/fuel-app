name: Update Live Fuel Status

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"

permissions:
  contents: write

jobs:
  update-live-status:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate live-status.json
        env:
          DOEB_API: ${{ secrets.DOEB_API }}
        run: node scripts/build-live-status.mjs

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add live-status.json
          git diff --cached --quiet || git commit -m "chore: update live fuel status"

      - name: Push changes
        run: |
          git push
