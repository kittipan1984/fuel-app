<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Fuel Station Finder</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f1f5f9;
}

/* 🔥 HEADER */
.header{
  background:linear-gradient(135deg,#0f172a,#1e293b);
  color:white;
  padding:20px;
  border-radius:0 0 20px 20px;
  box-shadow:0 10px 25px rgba(0,0,0,.2);
}
.title{font-size:24px;font-weight:900}
.sub{font-size:13px;opacity:.8}

.brand{
  margin-top:8px;
  font-size:18px;
  font-weight:800;
  background:linear-gradient(90deg,#22c55e,#06b6d4);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* CARD */
.card{
  background:white;
  margin:12px;
  padding:14px;
  border-radius:16px;
  box-shadow:0 5px 15px rgba(0,0,0,.05);
}

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:14px;
  font-size:15px;
  font-weight:bold;
  background:#10b981;
  color:white;
  margin-top:8px;
}

/* RESULT */
.station{
  background:white;
  margin:10px;
  padding:14px;
  border-radius:16px;
}

.name{font-size:16px;font-weight:800}
.distance{font-size:12px;color:#666}

/* FUEL */
.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:6px;
  margin-top:10px;
}

.box{
  padding:8px;
  border-radius:10px;
  font-size:12px;
}

.ok{background:#dcfce7;color:#166534}
.bad{background:#fee2e2;color:#b91c1c}
.unknown{background:#e2e8f0;color:#475569}

</style>
</head>

<body>

<div class="header">
  <div class="title">⛽ Fuel Station Finder</div>
  <div class="sub">ค้นหาปั๊มน้ำมัน + เช็คสถานะน้ำมัน</div>
  <div class="brand">✨ NaraMawin</div>
</div>

<div class="card">
  <button onclick="find()">ค้นหาปั๊มใกล้ฉัน</button>
</div>

<div id="result"></div>

<script>
let DATA = {};

function normalize(t){
  return t.toLowerCase().replace(/\s+/g,"");
}

function getStatus(name){
  const n = normalize(name);

  for(const key in DATA){
    const k = normalize(key);

    if(n.includes(k) || k.includes(n)){
      return DATA[key].fuels;
    }
  }

  return {};
}

function chip(label,val){
  let c="unknown",t="ไม่ทราบ";
  if(val=="available"){c="ok";t="มี";}
  if(val=="empty"){c="bad";t="หมด";}
  return `<div class="box ${c}">${label}: ${t}</div>`;
}

async function find(){
  document.getElementById("result").innerHTML="กำลังโหลด...";

  const pos = await new Promise((res,rej)=>{
    navigator.geolocation.getCurrentPosition(res,rej);
  });

  const lat=pos.coords.latitude;
  const lon=pos.coords.longitude;

  const url=`https://overpass-api.de/api/interpreter?data=[out:json];node["amenity"="fuel"](around:5000,${lat},${lon});out;`;

  const r = await fetch(url);
  const j = await r.json();

  let html="";

  j.elements.forEach(e=>{
    const name=e.tags.name||"ปั๊ม";
    const s=getStatus(name);

    html+=`
      <div class="station">
        <div class="name">${name}</div>

        <div class="grid">
          ${chip("95",s.gasohol95)}
          ${chip("91",s.gasohol91)}
          ${chip("B7",s.dieselB7)}
          ${chip("B10",s.dieselB10)}
          ${chip("Diesel",s.diesel)}
        </div>
      </div>
    `;
  });

  document.getElementById("result").innerHTML=html;
}

async function load(){
  try{
    const r = await fetch("./status.json");
    DATA = await r.json();
  }catch(e){
    alert("โหลด status.json ไม่ได้");
  }
}

load();
</script>

</body>
</html>
