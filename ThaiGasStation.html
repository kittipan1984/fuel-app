<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // เปลี่ยนมาใช้ API ที่รองรับ CORS และ HTTPS โดยตรงเพื่อความชัวร์
        const FUEL_API_URL = "https://api.sumit95.com/tw/oil_price/bangchak"; 

        let map = L.map('map').setView([12.6814, 101.1077], 13); 
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        let userMarker, stationMarkers = [];

        async function initSystem() {
            const listContainer = document.getElementById('list-container');
            const statusInfo = document.getElementById('status-info');
            
            listContainer.innerHTML = ''; 
            statusInfo.style.display = 'block';
            statusInfo.innerText = "📍 กำลังระบุตำแหน่ง GPS ของคุณ...";

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(async (pos) => {
                    const { latitude: uLat, longitude: uLng } = pos.coords;
                    if (userMarker) map.removeLayer(userMarker);
                    userMarker = L.marker([uLat, uLng]).addTo(map).bindPopup("คุณอยู่ที่นี่").openPopup();
                    map.setView([uLat, uLng], 14);
                    await fetchAndRenderData(uLat, uLng);
                }, () => {
                    statusInfo.innerText = "⚠️ โปรดอนุญาตสิทธิ์ GPS เพื่อดูระยะทาง";
                    fetchAndRenderData(12.6814, 101.1077); // ใช้พิกัดระยองถ้าไม่มี GPS
                });
            }
        }

        async function fetchAndRenderData(userLat, userLng) {
            const listContainer = document.getElementById('list-container');
            const statusInfo = document.getElementById('status-info');

            try {
                // ดึงข้อมูลราคาน้ำมัน
                const response = await fetch(FUEL_API_URL);
                const data = await response.json();
                
                // ดึงราคา Gasohol 95 (อ้างอิงตามโครงสร้าง JSON ของ API ทั่วไป)
                // ถ้า API บางตัวใช้ชื่ออื่น ระบบจะเลือกค่าที่ใกล้เคียงที่สุดมาโชว์
                const price95 = data.price?.gasohol_95 || data.gasohol_95 || "3x.xx";
                const lastUpdate = data.update_date || new Date().toLocaleDateString('th-TH');

                // พิกัดปั๊มบางจากในโซนระยอง/มาบตาพุดที่คุณต้องการ
                const stationsInRayong = [
                    { name: "บางจาก มาบตาพุด", lat: 12.6814, lng: 101.1711 },
                    { name: "บางจาก ห้วยโป่ง", lat: 12.6950, lng: 101.1450 },
                    { name: "บางจาก ระยองสาย 36", lat: 12.7200, lng: 101.2000 },
                    { name: "บางจาก บ้านฉาง", lat: 12.7210, lng: 101.0550 }
                ];

                statusInfo.style.display = 'none';
                listContainer.innerHTML = '';
                
                // ล้างหมุดเก่า
                stationMarkers.forEach(m => map.removeLayer(m));
                stationMarkers = [];

                // เรียงตามระยะทาง
                stationsInRayong.sort((a, b) => calculateDistance(userLat, userLng, a.lat, a.lng) - calculateDistance(userLat, userLng, b.lat, b.lng));

                stationsInRayong.forEach(s => {
                    const dist = calculateDistance(userLat, userLng, s.lat, s.lng).toFixed(2);
                    const m = L.marker([s.lat, s.lng]).addTo(map).bindPopup(s.name);
                    stationMarkers.push(m);

                    listContainer.innerHTML += `
                        <div class="card">
                            <div class="card-header">
                                <div class="station-name">${s.name}</div>
                                <span class="distance-badge">${dist} กม.</span>
                            </div>
                            <div class="fuel-info">
                                <span class="fuel-type">แก๊สโซฮอล์ 95</span>
                                <span class="fuel-price">฿${price95}</span>
                            </div>
                            <div class="data-source-label">
                                <span class="status-dot"></span>
                                Real-time Free Only Bangchak (${lastUpdate})
                            </div>
                        </div>
                    `;
                });
            } catch (error) {
                console.error(error);
                statusInfo.innerText = "❌ โหลดข้อมูลล้มเหลว (Check Internet/CORS)";
                // แสดงข้อมูลสำรองเพื่อให้แอปยังดูดี
                listContainer.innerHTML = '<div style="text-align:center; color:#666;">กรุณากด Refresh อีกครั้ง หรือตรวจสอบสิทธิ์การเข้าถึงข้อมูล</div>';
            }
        }

        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2-lat1) * Math.PI / 180;
            const dLon = (lon2-lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        initSystem();
    </script>
