<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Thai Gas Station</title>
  <style>
    :root{
      --bg:#f3f6fb;
      --card:#ffffff;
      --text:#1f2937;
      --muted:#6b7280;
      --primary:#0f9d58;
      --primary-dark:#0b7d46;
      --secondary:#334155;
      --border:#e5e7eb;
      --ok-bg:#ecfdf5;
      --ok-bd:#86efac;
      --ok-tx:#166534;
      --warn-bg:#fff7ed;
      --warn-bd:#fdba74;
      --warn-tx:#c2410c;
      --info-bg:#eef6ff;
      --info-bd:#bfdbfe;
      --info-tx:#1d4ed8;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: Arial, Helvetica, sans-serif; }
    body { -webkit-font-smoothing: antialiased; }

    .wrap {
      max-width: 760px;
      margin: 0 auto;
      padding: 14px;
      padding-bottom: 28px;
    }

    .title {
      margin: 8px 0 6px;
      font-size: 24px;
      font-weight: 700;
    }

    .subtitle {
      margin: 0 0 14px;
      font-size: 14px;
      color: var(--muted);
      line-height: 1.5;
    }

    .card {
      background: var(--card);
      border-radius: 18px;
      border: 1px solid var(--border);
      padding: 14px;
      box-shadow: 0 8px 22px rgba(0,0,0,0.05);
      margin-bottom: 12px;
    }

    .status {
      border-radius: 14px;
      padding: 12px 14px;
      font-size: 14px;
      line-height: 1.5;
      white-space: pre-wrap;
      background: var(--info-bg);
      border: 1px solid var(--info-bd);
      color: var(--info-tx);
    }
    .status.ok {
      background: var(--ok-bg);
      border-color: var(--ok-bd);
      color: var(--ok-tx);
    }
    .status.warn {
      background: var(--warn-bg);
      border-color: var(--warn-bd);
      color: var(--warn-tx);
    }

    .btn-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 12px;
    }

    button {
      border: 0;
      border-radius: 14px;
      min-height: 48px;
      padding: 12px 14px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .btn-primary {
      background: var(--primary);
      color: #fff;
    }
    .btn-primary:active { background: var(--primary-dark); }

    .btn-secondary {
      background: var(--secondary);
      color: #fff;
    }

    .field {
      margin-top: 12px;
    }

    .field label {
      display: block;
      margin-bottom: 6px;
      font-size: 13px;
      font-weight: 700;
      color: #334155;
    }

    input, select {
      width: 100%;
      min-height: 46px;
      border: 1px solid #cbd5e1;
      border-radius: 12px;
      padding: 10px 12px;
      font-size: 15px;
      background: #fff;
    }

    .small {
      margin-top: 10px;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.5;
    }

    .summary {
      font-size: 14px;
      color: #475569;
      line-height: 1.5;
    }

    .result-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .station {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px;
    }

    .station-head {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: center;
      margin-bottom: 8px;
    }

    .station-name {
      font-size: 16px;
      font-weight: 700;
      line-height: 1.4;
    }

    .badge {
      white-space: nowrap;
      background: #e6fffa;
      color: #0f766e;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 12px;
      font-weight: 700;
    }

    .meta {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.6;
      word-break: break-word;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 12px;
    }

    .link-btn {
      display: block;
      text-align: center;
      text-decoration: none;
      background: #111827;
      color: #fff;
      padding: 11px 10px;
      border-radius: 12px;
      font-size: 13px;
      font-weight: 700;
    }

    .link-btn.alt {
      background: #2563eb;
    }

    .hidden {
      display: none;
    }

    .footer-note {
      margin-top: 6px;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="title">ปั๊มน้ำมันใกล้ฉัน</div>
    <div class="subtitle">
      ใช้งานง่ายสำหรับมือถือ เปิดผ่าน GitHub Pages แล้วกดปุ่มเดียวเพื่อค้นหาปั๊มใกล้คุณ
    </div>

    <div class="card">
      <div id="statusBox" class="status">พร้อมใช้งาน กด “ค้นหาปั๊มใกล้ฉัน” ได้เลย</div>

      <div class="btn-row">
        <button class="btn-primary" onclick="findNearbyStations()">ค้นหาปั๊มใกล้ฉัน</button>
        <button class="btn-secondary" onclick="useBangkok()">ใช้พิกัดกรุงเทพ</button>
      </div>

      <div class="field">
        <label for="radiusInput">รัศมีค้นหา</label>
        <select id="radiusInput">
          <option value="2000">2 กม.</option>
          <option value="3000">3 กม.</option>
          <option value="5000" selected>5 กม.</option>
          <option value="10000">10 กม.</option>
          <option value="15000">15 กม.</option>
        </select>
      </div>

      <div class="small" id="coordText">ตำแหน่ง: ยังไม่ได้ระบุ</div>
      <div class="footer-note">
        หมายเหตุ: เวอร์ชันนี้เน้นให้ “ค้นหาสถานีใกล้ตัว” ใช้งานง่ายบนมือถือก่อน
      </div>
    </div>

    <div class="card">
      <div class="summary" id="summaryText">ยังไม่มีผลลัพธ์</div>
    </div>

    <div id="resultList" class="result-list"></div>
  </div>

  <script>
    const statusBox = document.getElementById("statusBox");
    const radiusInput = document.getElementById("radiusInput");
    const coordText = document.getElementById("coordText");
    const summaryText = document.getElementById("summaryText");
    const resultList = document.getElementById("resultList");

    const OVERPASS_ENDPOINTS = [
      "https://overpass-api.de/api/interpreter",
      "https://lz4.overpass-api.de/api/interpreter"
    ];

    let currentLat = null;
    let currentLng = null;

    function setStatus(text, type = "info") {
      statusBox.textContent = text;
      statusBox.className = "status";
      if (type === "ok") statusBox.classList.add("ok");
      if (type === "warn") statusBox.classList.add("warn");
    }

    function updateCoordText() {
      if (Number.isFinite(currentLat) && Number.isFinite(currentLng)) {
        coordText.textContent = `ตำแหน่ง: ${currentLat.toFixed(6)}, ${currentLng.toFixed(6)}`;
      } else {
        coordText.textContent = "ตำแหน่ง: ยังไม่ได้ระบุ";
      }
    }

    function useBangkok() {
      currentLat = 13.7563;
      currentLng = 100.5018;
      updateCoordText();
      setStatus("ใช้พิกัดกรุงเทพแล้ว กดค้นหาได้เลย", "ok");
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function haversineKm(lat1, lon1, lat2, lon2) {
      const R = 6371;
      const dLat = ((lat2 - lat1) * Math.PI) / 180;
      const dLon = ((lon2 - lon1) * Math.PI) / 180;
      const a =
        Math.sin(dLat / 2) * Math.sin(dLat / 2) +
        Math.cos((lat1 * Math.PI) / 180) *
        Math.cos((lat2 * Math.PI) / 180) *
        Math.sin(dLon / 2) *
        Math.sin(dLon / 2);
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    }

    function mapsLink(name, lat, lng) {
      return `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(name)}@${lat},${lng}`;
    }

    function dirLink(fromLat, fromLng, toLat, toLng) {
      return `https://www.google.com/maps/dir/?api=1&origin=${fromLat},${fromLng}&destination=${toLat},${toLng}&travelmode=driving`;
    }

    function normalizeBrandText(tags) {
      return tags.brand || tags.operator || tags.name || "-";
    }

    function renderStations(stations) {
      resultList.innerHTML = "";

      if (!stations.length) {
        summaryText.textContent = "ไม่พบปั๊มน้ำมันในรัศมีที่เลือก ลองเพิ่มเป็น 10 หรือ 15 กม.";
        return;
      }

      summaryText.textContent = `พบ ${stations.length} สถานี`;

      stations.forEach((s) => {
        const brandText = normalizeBrandText(s.tags || {});
        const addressText = s.address || "-";

        const el = document.createElement("div");
        el.className = "station";
        el.innerHTML = `
          <div class="station-head">
            <div class="station-name">${escapeHtml(s.name)}</div>
            <div class="badge">${s.distanceKm.toFixed(2)} กม.</div>
          </div>
          <div class="meta">
            แบรนด์: ${escapeHtml(brandText)}<br>
            ที่อยู่: ${escapeHtml(addressText)}<br>
            พิกัด: ${s.lat.toFixed(6)}, ${s.lng.toFixed(6)}
          </div>
          <div class="actions">
            <a class="link-btn" href="${mapsLink(s.name, s.lat, s.lng)}" target="_blank" rel="noopener noreferrer">เปิดแผนที่</a>
            <a class="link-btn alt" href="${dirLink(currentLat, currentLng, s.lat, s.lng)}" target="_blank" rel="noopener noreferrer">นำทาง</a>
          </div>
        `;
        resultList.appendChild(el);
      });
    }

    async function fetchWithTimeout(url, options = {}, timeoutMs = 20000) {
      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), timeoutMs);
      try {
        const res = await fetch(url, { ...options, signal: controller.signal });
        clearTimeout(timer);
        return res;
      } catch (err) {
        clearTimeout(timer);
        throw err;
      }
    }

    async function overpassQuery(query) {
      let lastErr = null;

      for (const endpoint of OVERPASS_ENDPOINTS) {
        try {
          const res = await fetchWithTimeout(endpoint, {
            method: "POST",
            headers: { "Content-Type": "text/plain;charset=UTF-8" },
            body: query
          }, 20000);

          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          return await res.json();
        } catch (err) {
          lastErr = err;
        }
      }

      throw lastErr || new Error("Overpass unavailable");
    }

    async function getCurrentPositionMobile() {
      return new Promise((resolve, reject) => {
        if (!navigator.geolocation) {
          reject(new Error("เบราว์เซอร์ไม่รองรับ GPS"));
          return;
        }

        navigator.geolocation.getCurrentPosition(
          (pos) => resolve(pos),
          (err) => reject(err),
          {
            enableHighAccuracy: true,
            timeout: 12000,
            maximumAge: 0
          }
        );
      });
    }

    async function findNearbyStations() {
      resultList.innerHTML = "";
      summaryText.textContent = "กำลังค้นหา...";

      try {
        setStatus("กำลังอ่านตำแหน่งปัจจุบัน...", "info");

        const pos = await getCurrentPositionMobile();
        currentLat = pos.coords.latitude;
        currentLng = pos.coords.longitude;
        updateCoordText();

        setStatus("กำลังค้นหาปั๊มน้ำมันใกล้คุณ...", "info");

        const radius = Number(radiusInput.value || 5000);

        const query = `
[out:json][timeout:20];
(
  node["amenity"="fuel"](around:${radius},${currentLat},${currentLng});
  way["amenity"="fuel"](around:${radius},${currentLat},${currentLng});
  relation["amenity"="fuel"](around:${radius},${currentLat},${currentLng});
);
out center tags;
`;

        const data = await overpassQuery(query);
        const elements = Array.isArray(data.elements) ? data.elements : [];

        const stations = elements.map((el) => {
          const lat = Number(el.lat ?? el.center?.lat);
          const lng = Number(el.lon ?? el.center?.lon);
          const tags = el.tags || {};

          const address = [
            tags["addr:housenumber"],
            tags["addr:street"],
            tags["addr:subdistrict"],
            tags["addr:district"],
            tags["addr:province"]
          ].filter(Boolean).join(" ");

          return {
            id: `${el.type}-${el.id}`,
            name: tags.name || tags.brand || "สถานีบริการน้ำมัน",
            lat,
            lng,
            tags,
            address,
            distanceKm: haversineKm(currentLat, currentLng, lat, lng)
          };
        }).filter(s => Number.isFinite(s.lat) && Number.isFinite(s.lng));

        stations.sort((a, b) => a.distanceKm - b.distanceKm);

        setStatus(`โหลดสำเร็จ พบ ${stations.length} สถานี`, "ok");
        renderStations(stations);
      } catch (err) {
        console.error(err);

        if (err.code === 1) {
          setStatus("ยังไม่ได้อนุญาตตำแหน่ง GPS กรุณาอนุญาต Location แล้วกดใหม่", "warn");
        } else if (err.code === 2) {
          setStatus("ไม่สามารถอ่านตำแหน่งปัจจุบันได้", "warn");
        } else if (err.code === 3) {
          setStatus("อ่านตำแหน่งหมดเวลา ลองใหม่อีกครั้ง", "warn");
        } else {
          setStatus("โหลดข้อมูลล้มเหลว ลองใหม่อีกครั้ง หรือกดใช้พิกัดกรุงเทพก่อน", "warn");
        }

        summaryText.textContent = "ยังโหลดผลลัพธ์ไม่ได้";
      }
    }

    updateCoordText();
  </script>
</body>
</html>
