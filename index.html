<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Fuel Finder</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body { margin:0; font-family:Arial; background:#eef4fb; }
header { background:#0f172a; color:#fff; padding:14px; }
.wrap { max-width:1100px; margin:auto; padding:12px; }

.card {
  background:#fff;
  border-radius:18px;
  padding:14px;
  margin-bottom:12px;
}

.controls { display:grid; gap:8px; }

button {
  padding:12px;
  border-radius:12px;
  border:none;
  cursor:pointer;
  font-weight:700;
}

.btn { background:#2563eb; color:#fff; }
.btn2 { background:#e2e8f0; }

#map { height:420px; border-radius:16px; }

.station {
  border:1px solid #e2e8f0;
  border-radius:14px;
  padding:12px;
  margin-bottom:10px;
}

.station-name { font-weight:900; }
.distance { font-weight:900; color:#1e40af; }

.fuel-grid {
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:6px;
  margin-top:8px;
}

.fuel {
  color:#fff;
  border-radius:8px;
  padding:6px;
  font-size:11px;
  text-align:center;
}

.ok { background:#dcfce7; }
.err { background:#fee2e2; }
</style>
</head>

<body>

<header>Fuel Finder (Real Data)</header>

<div class="wrap">

<div id="statusBox" class="card">Ready</div>

<div class="card">
  <div class="controls">
    <input id="latInput" placeholder="Lat"/>
    <input id="lngInput" placeholder="Lng"/>

    <button class="btn" id="gpsBtn">ใช้ตำแหน่งฉัน</button>
    <button class="btn2" id="demoBtn">Demo ระยอง</button>

    <select id="radiusInput">
      <option value="5">5 km</option>
      <option value="10">10 km</option>
      <option value="20">20 km</option>
      <option value="50" selected>50 km</option>
      <option value="100">100 km</option>
    </select>

    <button class="btn" id="findBtn">ค้นหา</button>
  </div>

  <div id="map"></div>
</div>

<div class="card">
  <div id="summaryText">-</div>
  <div id="resultList"></div>
</div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
const API = "https://script.google.com/macros/s/AKfycbwAS-C3MHwQkx4LddehRuraWoHp0tAlE3w5PiMObNfWyID2P2fZtwf_D2f0TGFhh-AP9A/exec";

let map, markers=[], userMarker;
let currentLat = 12.712261;
let currentLng = 101.208075;

function fuelColor(v){
  if(v==="ปกติ") return "#16a34a";
  if(v==="หมด") return "#dc2626";
  return "#64748b";
}

function setStatus(t){
  document.getElementById("statusBox").innerText=t;
}

function initMap(){
  map = L.map('map').setView([currentLat,currentLng],12);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
    maxZoom:19
  }).addTo(map);

  userMarker = L.marker([currentLat,currentLng]).addTo(map);
}

function clearMarkers(){
  markers.forEach(m=>map.removeLayer(m));
  markers=[];
  if(userMarker) map.removeLayer(userMarker);
}

function addUser(){
  userMarker = L.marker([currentLat,currentLng]).addTo(map);
}

function render(stations){
  const el = document.getElementById("resultList");
  el.innerHTML="";

  stations.forEach(s=>{
    const div=document.createElement("div");
    div.className="station";

    div.innerHTML=`
      <div class="station-name">${s.name}</div>
      <div class="distance">${s.distanceKm} km</div>

      <div>${s.province} / ${s.district}</div>

      <div class="fuel-grid">
        <div class="fuel" style="background:${fuelColor(s.g95)}">G95<br>${s.g95}</div>
        <div class="fuel" style="background:${fuelColor(s.diesel)}">Diesel<br>${s.diesel}</div>
        <div class="fuel" style="background:${fuelColor(s.g91)}">G91<br>${s.g91}</div>
        <div class="fuel" style="background:${fuelColor(s.e20)}">E20<br>${s.e20}</div>
        <div class="fuel" style="background:${fuelColor(s.e85)}">E85<br>${s.e85}</div>
      </div>
    `;

    el.appendChild(div);

    const m = L.marker([s.lat,s.lng]).addTo(map);
    m.bindPopup(s.name);
    markers.push(m);
  });
}

async function find(){
  try{
    currentLat = Number(latInput.value);
    currentLng = Number(lngInput.value);

    const r = radiusInput.value;

    setStatus("loading...");

    const res = await fetch(`${API}?action=nearby&lat=${currentLat}&lng=${currentLng}&radius_km=${r}`);
    const json = await res.json();

    if(!json.ok) throw "api error";

    clearMarkers();
    addUser();

    render(json.nearby);

    setStatus("ok");

    document.getElementById("summaryText").innerText =
      `พบ ${json.nearby.length} ปั๊ม`;

  }catch(e){
    setStatus("error "+e);
  }
}

gpsBtn.onclick=()=>{
  navigator.geolocation.getCurrentPosition(p=>{
    currentLat=p.coords.latitude;
    currentLng=p.coords.longitude;
    latInput.value=currentLat;
    lngInput.value=currentLng;
    map.setView([currentLat,currentLng],13);
  });
};

demoBtn.onclick=()=>{
  currentLat=12.712261;
  currentLng=101.208075;
  latInput.value=currentLat;
  lngInput.value=currentLng;
  map.setView([currentLat,currentLng],12);
};

findBtn.onclick=find;

window.onload=()=>{
  latInput.value=currentLat;
  lngInput.value=currentLng;
  initMap();
};
</script>

</body>
</html>
