<script>
const NEARBY_API = "https://script.google.com/macros/s/AKfycbwAS-C3MHwQkx4LddehRuraWoHp0tAlE3w5PiMObNfWyID2P2fZtwf_D2f0TGFhh-AP9A/exec";

const BOT_TOKEN = "PUT_YOUR_NEW_BOT_TOKEN_HERE";
const CHAT_ID = "PUT_YOUR_CHAT_ID_HERE";

const DEFAULT_LAT = 12.712261;
const DEFAULT_LNG = 101.208075;

let map = null;
let mapMarkers = [];
let userMarker = null;
let currentLat = DEFAULT_LAT;
let currentLng = DEFAULT_LNG;
let filteredStations = [];
let lastApiMeta = null;

function el(id) {
  return document.getElementById(id);
}

function showToast(msg) {
  const t = el("toast");
  if (!t) return;
  t.textContent = msg;
  t.style.display = "block";
  clearTimeout(window.__toastTimer);
  window.__toastTimer = setTimeout(() => t.style.display = "none", 2200);
}

async function copyText(text) {
  try {
    await navigator.clipboard.writeText(text || "");
    showToast("คัดลอกแล้ว: " + text);
  } catch (_) {
    showToast("คัดลอกไม่สำเร็จ");
  }
}

function setStatus(message, type = "") {
  const box = el("statusBox");
  if (!box) {
    console.warn("statusBox not found:", message);
    return;
  }
  box.className = "status" + (type ? " " + type : "");
  box.textContent = message;
}

function showBox(id, message) {
  const box = el(id);
  if (!box) return;
  box.style.display = message ? "block" : "none";
  box.textContent = message || "";
}

function getRadiusKm() {
  const raw = Number(el("radiusInput")?.value || 50);
  if (!Number.isFinite(raw)) return 50;
  return raw > 500 ? raw / 1000 : raw;
}

function updateDashboard(found = 0, searchStatus = "Ready") {
  const stamp = new Date().toLocaleString("th-TH");
  const radiusKm = getRadiusKm() + " กม.";

  const values = {
    heroUpdated: stamp,
    heroSearchStatus: searchStatus,
    heroFound: String(found),
    heroRadius: radiusKm,
    summaryUpdated: stamp,
    summarySearch: searchStatus,
    summaryFound: found + " ปั๊ม",
    headerUpdated: "Updated: " + stamp,
    headerFound: "Found: " + found
  };

  Object.keys(values).forEach(id => {
    const target = el(id);
    if (target) target.textContent = values[id];
  });
}

function updateCoordText() {
  const coordEl = el("coordText");
  const latEl = el("latInput");
  const lngEl = el("lngInput");

  if (coordEl) coordEl.textContent = `พิกัดปัจจุบัน: ${currentLat.toFixed(6)}, ${currentLng.toFixed(6)}`;
  if (latEl) latEl.value = currentLat.toFixed(6);
  if (lngEl) lngEl.value = currentLng.toFixed(6);
}

function escapeHtml(text) {
  return String(text ?? "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function escapeJsString(text) {
  return String(text ?? "")
    .replaceAll("\\", "\\\\")
    .replaceAll("'", "\\'")
    .replaceAll("\n", " ")
    .replaceAll("\r", " ");
}

function fuelColor(v) {
  const text = String(v || "").trim();
  if (text === "ปกติ") return "#16a34a";
  if (text === "หมด") return "#dc2626";
  return "#64748b";
}

function fuelCell(label, value) {
  return `<div class="fuel-pill" style="background:${fuelColor(value)};">${label}<br>${escapeHtml(value || "ไม่ระบุ")}</div>`;
}

function brandLabel(brandKey, stationName) {
  const mapLabel = {
    ptt: "PTT",
    bangchak: "Bangchak",
    shell: "Shell",
    esso: "Esso",
    caltex: "Caltex",
    pt: "PT",
    susco: "Susco",
    irpc: "IRPC",
    other: stationName || "อื่น ๆ"
  };
  return mapLabel[brandKey] || stationName || "อื่น ๆ";
}

function dirLink(s) {
  return `https://www.google.com/maps/dir/?api=1&origin=${currentLat},${currentLng}&destination=${s.lat},${s.lng}&travelmode=driving`;
}

function googleMapUrl(s) {
  return s.googleMapsLink || `https://www.google.com/maps/search/?api=1&query=${s.lat},${s.lng}`;
}

async function openFuelSmart(name, lat, lng) {
  await copyText(name);
  showToast("คัดลอกชื่อปั๊มแล้ว");
  setTimeout(() => window.open(`https://www.google.com/maps/search/?api=1&query=${lat},${lng}`, "_blank"), 450);
}

function initMap() {
  const mapEl = el("map");

  if (!mapEl) {
    console.warn("Map container #map not found. UI kept, map skipped.");
    return;
  }

  if (typeof L === "undefined") {
    console.warn("Leaflet library not loaded. UI kept, map skipped.");
    return;
  }

  if (map) {
    map.remove();
    map = null;
  }

  map = L.map(mapEl, { zoomControl: true }).setView([currentLat, currentLng], 12);

  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    maxZoom: 19,
    attribution: "&copy; OpenStreetMap contributors"
  }).addTo(map);

  addUserMarker(currentLat, currentLng);
}

function clearMapMarkers() {
  if (!map) return;

  mapMarkers.forEach(m => {
    if (m) map.removeLayer(m);
  });
  mapMarkers = [];

  if (userMarker) {
    map.removeLayer(userMarker);
    userMarker = null;
  }
}

function addUserMarker(lat, lng) {
  if (!map) return;
  userMarker = L.marker([lat, lng]).addTo(map);
  userMarker.bindPopup("<b>ตำแหน่งของคุณ</b>");
}

function addStationMarkers(stations) {
  if (!map) return;

  stations.forEach(s => {
    const marker = L.marker([s.lat, s.lng]).addTo(map);
    marker.bindPopup(`
      <b>${escapeHtml(s.name || "-")}</b><br>
      ระยะทาง: ${Number(s.distanceKm || 0).toFixed(2)} กม.<br>
      ${escapeHtml(s.province || "-")} / ${escapeHtml(s.district || "-")}<br><br>
      <a href="${dirLink(s)}" target="_blank">นำทาง</a>
    `);
    mapMarkers.push(marker);
  });

  if (stations.length > 0) {
    const bounds = L.latLngBounds(stations.map(s => [s.lat, s.lng]));
    bounds.extend([currentLat, currentLng]);
    map.fitBounds(bounds.pad(0.15));
  } else {
    map.setView([currentLat, currentLng], 13);
  }
}

function renderLiveBox(station) {
  return `
    <div class="live-title">📊 สถานะเชิงอ้างอิง</div>
    <div class="live-grid">
      ${fuelCell("G95", station.g95)}
      ${fuelCell("Diesel", station.diesel)}
      ${fuelCell("G91", station.g91)}
      ${fuelCell("E20", station.e20)}
      ${fuelCell("E85", station.e85)}
    </div>
    <div class="fuel-sub">
      ${lastApiMeta?.updated_at ? `อัปเดต: ${escapeHtml(new Date(lastApiMeta.updated_at).toLocaleString("th-TH"))}` : ""}
      | Public Fuel Data
    </div>
  `;
}

function renderStations(stations) {
  const list = el("resultList");
  if (!list) return;

  list.innerHTML = "";

  if (!stations.length) {
    list.innerHTML = `<div class="empty">ไม่พบปั๊มในรัศมี ${getRadiusKm()} กม.</div>`;
    return;
  }

  stations.forEach(s => {
    const copyNameJs = escapeJsString(s.name || "-");

    const item = document.createElement("div");
    item.className = "station";
    item.innerHTML = `
      <div class="station-top">
        <div class="station-name">${escapeHtml(s.name || "-")}</div>
        <div class="distance">${Number(s.distanceKm || 0).toFixed(2)} กม.</div>
      </div>

      <div class="brand-row">
        <div class="brand-badge">${escapeHtml(s.brandLabel || brandLabel(s.brand, s.name))}</div>
        <div class="brand-badge">ID: ${escapeHtml(s.id || "-")}</div>
      </div>

      <div class="meta">
        ที่อยู่: ${escapeHtml(s.address || "-")}<br>
        จังหวัด: ${escapeHtml(s.province || "-")}<br>
        อำเภอ: ${escapeHtml(s.district || "-")}<br>
        พิกัด: ${Number(s.lat).toFixed(6)}, ${Number(s.lng).toFixed(6)}
      </div>

      <div class="action-row">
        <a class="btn-link secondary" href="${dirLink(s)}" target="_blank" rel="noopener noreferrer">นำทาง</a>
        <a class="btn-link" href="${googleMapUrl(s)}" target="_blank" rel="noopener noreferrer">เปิดแผนที่</a>
        <button class="btn-link" type="button" onclick="openFuelSmart('${copyNameJs}', ${s.lat}, ${s.lng})">Copy + เปิด</button>
      </div>

      <div class="helper-box">
        <div class="helper-title">⚡ Smart Search</div>
        <div class="helper-text">ข้อมูลนี้ดึงจาก Public Fuel Data ผ่าน Apps Script แล้วคำนวณระยะตามพิกัดจริง</div>
        <div class="helper-name">${escapeHtml(s.name || "-")}</div>

        <div class="helper-actions">
          <button class="mini-btn" type="button" onclick="copyText('${copyNameJs}')">📋 Copy ชื่อปั๊ม</button>
          <button class="mini-btn" type="button" onclick="copyText('${escapeJsString(s.province || "")}')">จังหวัด</button>
          <button class="mini-btn" type="button" onclick="copyText('${escapeJsString(s.district || "")}')">อำเภอ</button>
          <button class="mini-btn green" type="button" onclick="copyText('${escapeJsString(s.id || "")}')">Copy ID</button>
        </div>
      </div>

      <div class="live-box">
        ${renderLiveBox(s)}
      </div>
    `;

    list.appendChild(item);
  });
}

async function findNearbyStations() {
  try {
    currentLat = Number(el("latInput")?.value);
    currentLng = Number(el("lngInput")?.value);

    if (!Number.isFinite(currentLat) || !Number.isFinite(currentLng)) {
      throw new Error("กรุณากด 'ใช้ตำแหน่งฉัน' หรือกรอกพิกัดก่อนค้นหา");
    }

    const radiusKm = getRadiusKm();
    const selectedBrand = el("brandFilter")?.value || "all";

    updateCoordText();
    updateDashboard(0, "Loading");
    setStatus("กำลังดึงข้อมูลจริงและคำนวณรัศมี...", "");

    if (el("countBadge")) el("countBadge").textContent = "กำลังค้นหา...";
    if (el("summaryText")) el("summaryText").textContent = "กำลังโหลดผลลัพธ์";
    if (el("resultList")) el("resultList").innerHTML = `<div class="empty">กำลังโหลดข้อมูล...</div>`;

    const url =
      `${NEARBY_API}?action=nearby`
      + `&lat=${encodeURIComponent(currentLat)}`
      + `&lng=${encodeURIComponent(currentLng)}`
      + `&radius_km=${encodeURIComponent(radiusKm)}`
      + `&t=${Date.now()}`;

    const res = await fetch(url);
    if (!res.ok) throw new Error("API HTTP " + res.status);

    const json = await res.json();
    if (!json.ok) throw new Error(json.error || "API error");

    lastApiMeta = json;

    const stationsBefore = json.nearby || [];

    let stations = stationsBefore
      .filter(s => Number.isFinite(Number(s.distanceKm)))
      .filter(s => Number(s.distanceKm) <= radiusKm)
      .sort((a, b) => Number(a.distanceKm) - Number(b.distanceKm));

    if (selectedBrand !== "all") {
      stations = stations.filter(s => s.brand === selectedBrand);
    }

    stations = stations.slice(0, 50);
    filteredStations = stations;

    console.log("RADIUS:", radiusKm);
    console.log("BEFORE:", stationsBefore.length);
    console.log("AFTER:", stations.length);

    clearMapMarkers();
    addUserMarker(currentLat, currentLng);
    addStationMarkers(stations);
    renderStations(stations);

    if (el("countBadge")) el("countBadge").textContent = `${stations.length} ปั๊ม`;

    if (el("summaryText")) {
      el("summaryText").textContent =
        `พบ ${stations.length} ปั๊มในรัศมี ${radiusKm} กม.\n`
        + `API returned: ${stationsBefore.length} | rows_total: ${json.rows_total} | with_location: ${json.with_location}`;
    }

    setStatus("ค้นหาสำเร็จ", "ok");
    updateDashboard(stations.length, "Ready");

  } catch (err) {
    console.error(err);
    setStatus("ค้นหาล้มเหลว: " + (err.message || String(err)), "error");
    if (el("summaryText")) el("summaryText").textContent = "เกิดข้อผิดพลาด";
    if (el("resultList")) el("resultList").innerHTML = `<div class="empty">${escapeHtml(err.message || String(err))}</div>`;
    updateDashboard(0, "Error");
  }
}

function useBrowserGPS() {
  if (!navigator.geolocation) {
    setStatus("อุปกรณ์นี้ไม่รองรับ GPS", "warn");
    return;
  }

  setStatus("กำลังขอตำแหน่งจากอุปกรณ์...", "");

  navigator.geolocation.getCurrentPosition(
    pos => {
      currentLat = pos.coords.latitude;
      currentLng = pos.coords.longitude;
      updateCoordText();
      clearMapMarkers();
      addUserMarker(currentLat, currentLng);
      if (map) map.setView([currentLat, currentLng], 13);
      setStatus("ใช้ตำแหน่งจากอุปกรณ์สำเร็จ กดค้นหาปั๊มใกล้ฉันต่อได้เลย", "ok");
    },
    err => {
      let msg = "ดึงตำแหน่งไม่สำเร็จ";
      if (err && err.code === 1) msg += " : ผู้ใช้ปฏิเสธสิทธิ์เข้าถึงตำแหน่ง";
      else if (err && err.code === 2) msg += " : ไม่สามารถระบุตำแหน่งได้";
      else if (err && err.code === 3) msg += " : ใช้เวลานานเกินไป";
      setStatus(msg, "warn");
    },
    { enableHighAccuracy: true, timeout: 12000, maximumAge: 0 }
  );
}

function setupBottomNav() {
  document.querySelectorAll(".nav-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".nav-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      const target = el(btn.getAttribute("data-target"));
      if (target) target.scrollIntoView({ behavior: "smooth", block: "start" });
    });
  });
}

document.addEventListener("DOMContentLoaded", () => {
  try {
    initMap();
    updateCoordText();
    updateDashboard(0, "Ready");
    setupBottomNav();

    el("gpsBtn")?.addEventListener("click", useBrowserGPS);
    el("findBtn")?.addEventListener("click", findNearbyStations);

    el("demoBtn")?.addEventListener("click", async () => {
      currentLat = DEFAULT_LAT;
      currentLng = DEFAULT_LNG;
      updateCoordText();
      clearMapMarkers();
      addUserMarker(currentLat, currentLng);
      if (map) map.setView([currentLat, currentLng], 12);
      setStatus("ใช้พิกัดทดสอบระยองแล้ว", "ok");
      await findNearbyStations();
    });

    el("radiusInput")?.addEventListener("change", () => {
      const target = el("heroRadius");
      if (target) target.textContent = getRadiusKm() + " กม.";
    });

  } catch (err) {
    console.error(err);
    setStatus("หน้าเว็บเริ่มต้นไม่สำเร็จ: " + (err.message || String(err)), "error");
  }
});

window.copyText = copyText;
window.openFuelSmart = openFuelSmart;
</script>
