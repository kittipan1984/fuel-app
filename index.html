<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Fuel Finder PRO+</title>

<style>
:root{
  --bg:#f4f7fb;
  --card:#ffffff;
  --text:#162033;
  --green:#10b981;
  --blue:#2563eb;
}

body{
  margin:0;
  font-family:Arial;
  background:var(--bg);
}

/* 🔥 FIXED HEADER */
.header{
  position:sticky;
  top:0;
  z-index:999;
  background:linear-gradient(135deg,#0f172a,#0f766e);
  color:#fff;
  padding:18px;
  box-shadow:0 10px 30px rgba(0,0,0,.25);
}

.title{
  font-size:22px;
  font-weight:900;
}

.owner{
  font-size:14px;
  opacity:.8;
}

.container{
  padding:15px;
}

.card{
  background:#fff;
  border-radius:15px;
  padding:12px;
  margin-top:12px;
  box-shadow:0 6px 15px rgba(0,0,0,.08);
}

button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:12px;
  border:0;
  color:#fff;
  font-weight:800;
}

.btn1{background:var(--green);}
.btn2{background:var(--blue);}

.station{
  border:1px solid #eee;
  padding:10px;
  border-radius:12px;
  margin-top:10px;
}

</style>
</head>

<body>

<!-- 🔥 HEADER FIXED -->
<div class="header">
  <div class="title">⛽ Fuel Finder</div>
  <div class="owner">By NaraMawin</div>
</div>

<div class="container">

<div class="card">
  <button class="btn1" onclick="find()">ค้นหาปั๊มใกล้ฉัน</button>
  <button class="btn2" onclick="loadStatus()">Reload Status</button>
</div>

<div id="result"></div>

</div>

<script>
let STATUS = {stations:[]};

async function loadStatus(){
  const res = await fetch("status.json?v="+Date.now());
  STATUS = await res.json();
  alert("โหลด status สำเร็จ");
}

function match(name){
  name = name.toLowerCase();
  for(const s of STATUS.stations){
    for(const k of s.matchKeys){
      if(name.includes(k)) return s;
    }
  }
  return null;
}

async function find(){
  const res = await fetch("https://overpass-api.de/api/interpreter",{
    method:"POST",
    body:`[out:json];node["amenity"="fuel"](around:3000,13.75,100.5);out;`
  });

  const data = await res.json();
  const div = document.getElementById("result");
  div.innerHTML="";

  data.elements.forEach(e=>{
    const name = e.tags.name || "ปั๊ม";
    const m = match(name);

    div.innerHTML += `
      <div class="station">
        <b>${name}</b><br>
        น้ำมัน: ${m ? JSON.stringify(m.fuels) : "ไม่ทราบ"}
      </div>
    `;
  });
}
</script>

</body>
</html>
