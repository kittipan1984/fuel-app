<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>NaraMawin Fuel Finder</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f4f7fb;
}

/* HEADER */
.header{
  position:sticky;
  top:0;
  z-index:1000;
  background:linear-gradient(135deg,#0f172a,#0f766e);
  color:white;
  padding:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

/* TEXT */
.title{
  font-size:22px;
  font-weight:900;
}

.by{
  font-size:14px;
  margin-top:4px;
}

/* AVATAR FIX */
.hero-avatar-wrap{
  width:70px;
  height:70px;
  border-radius:50%;
  border:3px solid rgba(255,255,255,.8);
  overflow:hidden;
}

.hero-avatar{
  width:100%;
  height:100%;
  object-fit:cover;
  object-position:50% 18%;
}

/* CONTENT */
.container{
  padding:15px;
}

.card{
  background:white;
  padding:15px;
  border-radius:15px;
  margin-top:10px;
}

/* BUTTON */
.btn{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
  margin-top:10px;
}

.btn-report{
  background:#7c3aed;
  color:white;
}

.btn-message{
  background:#2563eb;
  color:white;
}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  display:none;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,.6);
}

.modal-box{
  background:white;
  padding:20px;
  border-radius:15px;
  width:90%;
  max-width:400px;
}

input,textarea{
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
  border:1px solid #ccc;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div>
    <div class="title">⛽ NaraMawin Fuel Finder</div>
    <div class="by">By NaraMawin</div>
  </div>

  <!-- ✅ รูป -->
  <div class="hero-avatar-wrap">
    <img class="hero-avatar" src="./child-header.png?v=1">
  </div>
</div>

<!-- CONTENT -->
<div class="container">

  <div class="card">
    <!-- GOOGLE FORM -->
    <a href="https://docs.google.com/forms/d/e/1FAIpQLSdApv6W6uAEWHzuFlkFkOG80iLIYSwPiveJwuCifxYvCkiAEg/viewform" target="_blank">
      <button class="btn btn-report">รายงานสถานะน้ำมัน</button>
    </a>

    <!-- MESSAGE -->
    <button class="btn btn-message" id="openMsg">ส่งข้อความถึงฉัน</button>
  </div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-box">
    <h3>ส่งข้อความ</h3>

    <input id="name" placeholder="ชื่อ">
    <textarea id="msg" placeholder="ข้อความ"></textarea>

    <button class="btn" id="send" style="background:green;color:white;">ส่ง</button>
    <button class="btn" id="close" style="background:gray;color:white;">ปิด</button>
  </div>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbwGtU2fRx6Mblya9JwFY_C3cfbZgJJHynlMKa_XDdptvy9ObsVufhqHOE4JpDAwYRbS/exec";

/* OPEN */
document.getElementById("openMsg").onclick = () => {
  document.getElementById("modal").style.display="flex";
};

/* CLOSE */
document.getElementById("close").onclick = () => {
  document.getElementById("modal").style.display="none";
};

/* SEND */
document.getElementById("send").onclick = async () => {
  const name = document.getElementById("name").value || "Anonymous";
  const msg = document.getElementById("msg").value;

  if(!msg){
    alert("กรอกข้อความก่อน");
    return;
  }

  try{
    await fetch(API,{
      method:"POST",
      mode:"no-cors",
      body:JSON.stringify({name,msg})
    });

    alert("ส่งแล้ว ✅");
    document.getElementById("modal").style.display="none";

  }catch(e){
    alert("ส่งไม่สำเร็จ");
  }
};
</script>

</body>
</html>
