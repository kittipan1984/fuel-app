<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fuel Finder</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  background:#0f172a;
  color:#fff;
}

/* HEADER */
.topbar{
  position:fixed;
  top:0;
  width:100%;
  height:70px;
  background:#111827;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 14px;
  z-index:999;
  border-bottom:1px solid #1f2937;
}

.brand{
  display:flex;
  align-items:center;
  gap:10px;
}

.avatar{
  width:40px;
  height:40px;
  border-radius:50%;
  overflow:hidden;
}

.avatar img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.brand-text{
  line-height:1.1;
}

.brand-title{
  font-weight:800;
  font-size:16px;
}

.brand-sub{
  font-size:11px;
  color:#9ca3af;
}

/* MAP */
#map{
  position:absolute;
  top:70px;
  bottom:0;
  width:100%;
}

/* BOTTOM SHEET */
.sheet{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:#111827;
  border-top-left-radius:16px;
  border-top-right-radius:16px;
  padding:12px;
  max-height:45%;
  overflow:auto;
}

.station{
  padding:10px;
  border-bottom:1px solid #1f2937;
}

.station-name{
  font-weight:700;
}

.btn{
  margin-top:6px;
  padding:8px 10px;
  border-radius:8px;
  border:none;
  font-weight:700;
  width:100%;
}

.btn-nav{
  background:#22c55e;
}

.btn-fuel{
  background:#3b82f6;
  margin-top:6px;
}
</style>
</head>

<body>

<div class="topbar">
  <div class="brand">
    <div class="avatar">
      <img src="child-header.png" onerror="this.src='https://placehold.co/100x100'">
    </div>
    <div class="brand-text">
      <div class="brand-title">Fuel Finder</div>
      <div class="brand-sub">By NaraMawin</div>
    </div>
  </div>
</div>

<div id="map"></div>

<div class="sheet" id="sheet">
  <div>🔄 กำลังค้นหาปั๊ม...</div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
let map = L.map('map').setView([13.736717,100.523186], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
  attribution:'© OpenStreetMap'
}).addTo(map);

navigator.geolocation.getCurrentPosition(pos=>{
  const lat = pos.coords.latitude;
  const lng = pos.coords.longitude;

  map.setView([lat,lng],14);

  loadStations(lat,lng);
});

async function loadStations(lat,lng){

  const query = `
  [out:json];
  (
    node["amenity"="fuel"](around:5000,${lat},${lng});
  );
  out;
  `;

  const url = "https://overpass-api.de/api/interpreter?data="+encodeURIComponent(query);

  const res = await fetch(url);
  const data = await res.json();

  const list = [];

  data.elements.forEach(e=>{
    const name = e.tags.name || "Unknown";

    L.marker([e.lat,e.lon]).addTo(map)
      .bindPopup(name);

    list.push({
      name,
      lat:e.lat,
      lon:e.lon
    });
  });

  renderList(list, lat, lng);
}

function renderList(list, lat, lng){
  const el = document.getElementById("sheet");

  if(list.length===0){
    el.innerHTML="❌ ไม่พบปั๊ม";
    return;
  }

  el.innerHTML = `
  <div>พบ ${list.length} ปั๊มในระยะ 5 กม.</div>
  ` + list.map(s=>`
    <div class="station">
      <div class="station-name">${s.name}</div>

      <button class="btn btn-nav"
        onclick="nav(${s.lat},${s.lon})">
        นำทาง
      </button>

      <button class="btn btn-fuel"
        onclick="openFuel(${lat},${lng})">
        ดูสถานะน้ำมันจริง
      </button>
    </div>
  `).join("");
}

function nav(lat,lon){
  window.open(`https://www.google.com/maps?q=${lat},${lon}`,"_blank");
}

function openFuel(lat,lng){
  window.open(`https://fuel-now.doeb.go.th/?lat=${lat}&lng=${lng}`,"_blank");
}
</script>

</body>
</html>
