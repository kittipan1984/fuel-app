<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <title>Fuel Finder</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    body { font-family: sans-serif; margin:0; }
    #map { height: 60vh; }
    .card { padding:10px; border-bottom:1px solid #ddd; }
  </style>
</head>
<body>

<h2 style="padding:10px;">📍 ปั๊มใกล้ฉัน</h2>

<div id="map"></div>
<div id="list"></div>

<script>
const NEARBY_API = "https://script.google.com/macros/s/AKfycbwAS-C3MHwQkx4LddehRuraWoHp0tAlE3w5PiMObNfWyID2P2fZtwf_D2f0TGFhh-AP9A/exec";

let map;
let userMarker;

function initMap(lat, lng) {
  map = L.map("map").setView([lat, lng], 13);

  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    maxZoom: 19
  }).addTo(map);

  userMarker = L.marker([lat, lng]).addTo(map)
    .bindPopup("คุณอยู่ที่นี่")
    .openPopup();
}

function renderStations(list) {
  const el = document.getElementById("list");
  el.innerHTML = "";

  list.forEach(s => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <b>${s.name}</b><br/>
      ${s.distanceKm.toFixed(2)} km<br/>
      ⛽ Diesel: ${s.diesel} | 95: ${s.g95}
    `;

    el.appendChild(div);

    L.marker([s.lat, s.lng]).addTo(map)
      .bindPopup(s.name);
  });
}

async function loadNearby(lat, lng) {
  const url = `${NEARBY_API}?action=nearby&lat=${lat}&lng=${lng}`;

  const res = await fetch(url);
  const data = await res.json();

  if (!data.ok) {
    alert("โหลดข้อมูลไม่สำเร็จ");
    return;
  }

  renderStations(data.nearby || []);
}

function start() {
  if (!navigator.geolocation) {
    alert("Browser ไม่รองรับ location");
    return;
  }

  navigator.geolocation.getCurrentPosition(
    pos => {
      const lat = pos.coords.latitude;
      const lng = pos.coords.longitude;

      initMap(lat, lng);
      loadNearby(lat, lng);
    },
    () => {
      alert("ไม่สามารถดึงตำแหน่งได้");
    }
  );
}

document.addEventListener("DOMContentLoaded", start);
</script>

</body>
</html>
