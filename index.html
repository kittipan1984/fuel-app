<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>NaraMawin Fuel Finder</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#f5f7fb;
}

/* HEADER */
.header {
  position:sticky;
  top:0;
  background:#0f172a;
  color:white;
  padding:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.avatar {
  width:60px;
  height:60px;
  border-radius:50%;
  background:url("child-header.png") center/cover;
}

/* BUTTON */
.btn {
  padding:12px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
}

.btn-message {
  background:#2563eb;
  color:white;
  width:100%;
  margin-top:10px;
}

/* MODAL */
.modal {
  position:fixed;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  background:rgba(0,0,0,0.6);
  z-index:9999;
}

.modal-box {
  background:white;
  padding:20px;
  border-radius:15px;
  width:90%;
  max-width:400px;
}

input, textarea {
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
  border:1px solid #ccc;
}

</style>
</head>

<body>

<div class="header">
  <div>
    <h2>NaraMawin Fuel Finder</h2>
    <div>By NaraMawin</div>
  </div>
  <div class="avatar"></div>
</div>

<div style="padding:15px;">
  <button class="btn btn-message" id="messageBtn">
    ส่งข้อความถึงฉัน
  </button>
</div>

<!-- MODAL -->
<div class="modal" id="messageModal">
  <div class="modal-box">
    <h3>ส่งข้อความ</h3>

    <input id="senderName" placeholder="ชื่อ">
    <textarea id="messageText" placeholder="ข้อความ"></textarea>

    <button class="btn" id="sendMessageBtn" style="background:green;color:white;margin-top:10px;">
      ส่ง
    </button>

    <button class="btn" id="cancelMessageBtn" style="background:gray;color:white;margin-top:10px;">
      ปิด
    </button>
  </div>
</div>

<script>
const MESSAGE_API_URL = "PUT_YOUR_APPS_SCRIPT_URL_HERE";

document.addEventListener("DOMContentLoaded", function () {

  console.log("INIT UI");

  const messageBtn = document.getElementById("messageBtn");
  const modal = document.getElementById("messageModal");
  const cancelBtn = document.getElementById("cancelMessageBtn");
  const sendBtn = document.getElementById("sendMessageBtn");

  function openModal() {
    console.log("OPEN");
    modal.style.display = "flex";
  }

  function closeModal() {
    modal.style.display = "none";
  }

  async function sendMessage() {
    const name = document.getElementById("senderName").value || "Anonymous";
    const text = document.getElementById("messageText").value;

    if (!text) {
      alert("กรอกข้อความก่อน");
      return;
    }

    try {
      await fetch(MESSAGE_API_URL, {
        method: "POST",
        mode: "no-cors",
        headers: {
          "Content-Type": "text/plain"
        },
        body: JSON.stringify({
          sender: name,
          message: text
        })
      });

      alert("ส่งแล้ว! ไปดู Telegram 📩");
      closeModal();

    } catch (err) {
      alert("error: " + err.message);
    }
  }

  messageBtn.addEventListener("click", openModal);
  cancelBtn.addEventListener("click", closeModal);
  sendBtn.addEventListener("click", sendMessage);

  modal.addEventListener("click", (e) => {
    if (e.target === modal) closeModal();
  });

});
</script>

</body>
</html>
