<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fuel Finder PRO MAX</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont;
  background:#0f172a;
  color:#fff;
}

header{
  position:sticky;
  top:0;
  background:#020617;
  padding:15px;
  text-align:center;
  font-weight:700;
  z-index:10;
}

.container{
  padding:10px;
}

.card{
  background:#1e293b;
  padding:12px;
  border-radius:12px;
  margin-bottom:10px;
}

.title{
  font-weight:700;
}

.sub{
  font-size:12px;
  color:#94a3b8;
}

.fuel{
  margin-top:8px;
  display:flex;
  gap:8px;
}

.badge{
  flex:1;
  padding:8px;
  border-radius:8px;
  text-align:center;
  font-size:12px;
  font-weight:700;
}

.green{background:#16a34a;}
.red{background:#dc2626;}
.gray{background:#64748b;}
</style>
</head>

<body>

<header>
🔥 Fuel Finder PRO MAX
</header>

<div class="container" id="list">
Loading...
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbyKeHguKsQGCZm0t-DDUa4To0V_Xtxtowhv3XNq6AVTgA-TYSFYAtbHp3MwVBsnKIhYTw/exec";

function color(v){
  if(v==="ปกติ") return "green";
  if(v==="หมด") return "red";
  return "gray";
}

async function getFuel(s){
  try{
    const url = `${API}?name=${encodeURIComponent(s.name)}&brand=${encodeURIComponent(s.brandLabel)}&province=${encodeURIComponent(s.province)}&amphoe=${encodeURIComponent(s.district)}`;
    const res = await fetch(url);
    const data = await res.json();

    return {
      g95: data?.G95 || "ไม่รู้",
      diesel: data?.D || "ไม่รู้"
    };

  }catch(e){
    return {g95:"error",diesel:"error"};
  }
}

async function render(){

  const res = await fetch("stations.json");
  const stations = await res.json();

  const list = document.getElementById("list");
  list.innerHTML = "";

  for(const s of stations){

    const div = document.createElement("div");
    div.className="card";

    div.innerHTML = `
      <div class="title">${s.name}</div>
      <div class="sub">${s.brandLabel} • ${s.province}</div>

      <div id="fuel-${s.id}" class="fuel">
        <div class="badge gray">⏳ Loading</div>
      </div>
    `;

    list.appendChild(div);

    // โหลด realtime ทีละปั๊ม
    const f = await getFuel(s);

    document.getElementById(`fuel-${s.id}`).innerHTML = `
      <div class="badge ${color(f.g95)}">G95<br>${f.g95}</div>
      <div class="badge ${color(f.diesel)}">Diesel<br>${f.diesel}</div>
    `;
  }
}

render();
</script>

</body>
</html>
