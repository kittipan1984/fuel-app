<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Fuel Finder</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body { font-family: Arial; margin:0; padding:0; }
#map { height: 50vh; }
.controls { padding:10px; background:#f5f5f5; }
button { padding:10px; margin:5px; cursor:pointer; }
.station { border-bottom:1px solid #ddd; padding:10px; }
.empty { padding:20px; color:red; }
</style>
</head>

<body>

<div class="controls">
  <button onclick="useGPS()">📍 ใช้ตำแหน่งฉัน</button>
  <button onclick="findNearby()">🔍 หาปั๊มใกล้ฉัน</button>
  <br>
  Lat: <input id="lat" size="10">
  Lng: <input id="lng" size="10">
</div>

<div id="map"></div>
<div id="result"></div>

<script>
let map;
let userLat = 13.7563;
let userLng = 100.5018;
let stations = [];
let markers = [];

function initMap() {
  map = L.map('map').setView([userLat, userLng], 10);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
}

function haversine(lat1, lon1, lat2, lon2) {
  const R = 6371;
  const dLat = (lat2-lat1)*Math.PI/180;
  const dLon = (lon2-lon1)*Math.PI/180;

  const a =
    Math.sin(dLat/2)**2 +
    Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180) *
    Math.sin(dLon/2)**2;

  return 2 * R * Math.asin(Math.sqrt(a));
}

async function loadStations() {
  const res = await fetch('stations.json');
  stations = await res.json();
  console.log("TOTAL:", stations.length);
}

function clearMarkers() {
  markers.forEach(m => map.removeLayer(m));
  markers = [];
}

function addMarker(lat, lng, text) {
  const m = L.marker([lat,lng]).addTo(map);
  m.bindPopup(text);
  markers.push(m);
}

function useGPS() {
  navigator.geolocation.getCurrentPosition(pos => {
    userLat = pos.coords.latitude;
    userLng = pos.coords.longitude;

    document.getElementById("lat").value = userLat;
    document.getElementById("lng").value = userLng;

    map.setView([userLat,userLng], 12);
    clearMarkers();
    addMarker(userLat,userLng,"คุณอยู่ที่นี่");

  }, err => {
    alert("GPS error");
  });
}

function findNearby() {
  if (!stations.length) {
    alert("ยังโหลดข้อมูลไม่เสร็จ");
    return;
  }

  const lat = parseFloat(document.getElementById("lat").value);
  const lng = parseFloat(document.getElementById("lng").value);

  if (!lat || !lng) {
    alert("กรุณากดใช้ตำแหน่งก่อน");
    return;
  }

  const ranked = stations.map(s => ({
    ...s,
    dist: haversine(lat,lng,s.lat,s.lng)
  })).sort((a,b)=>a.dist-b.dist);

  console.log("NEAREST:", ranked.slice(0,5));

  // === กรอง 10km ===
  let result = ranked.filter(s => s.dist <= 10);

  // === fallback กันพลาด ===
  if (result.length === 0) {
    const safe = ranked.filter(s => s.dist <= 150);

    if (safe.length === 0) {
      document.getElementById("result").innerHTML =
        "<div class='empty'>❌ ไม่มีข้อมูลใกล้คุณ (stations.json ไม่มีระยอง)</div>";
      return;
    }

    result = safe.slice(0,10);
  }

  clearMarkers();
  addMarker(lat,lng,"คุณอยู่ที่นี่");

  let html = "";

  result.forEach(s=>{
    addMarker(s.lat,s.lng,s.name);

    html += `
      <div class="station">
        <b>${s.name}</b><br>
        ${s.dist.toFixed(2)} กม.<br>
        ${s.province || ""}
      </div>
    `;
  });

  document.getElementById("result").innerHTML = html;
}
initMap();
loadStations();
</script>

</body>
</html>
