<script>
  // ===== ใส่ค่าของคุณเอง =====
  const BOT_TOKEN = "PUT_YOUR_BOT_TOKEN_HERE";
  const CHAT_ID = "PUT_YOUR_CHAT_ID_HERE";

  const STATIONS_URL = "./stations.json";
  const LIVE_STATUS_URL = "./live-status.json";

  const DEFAULT_LAT = 13.7563;
  const DEFAULT_LNG = 100.5018;

  let map;
  let mapMarkers = [];
  let userMarker = null;
  let currentLat = DEFAULT_LAT;
  let currentLng = DEFAULT_LNG;
  let allStations = [];
  let filteredStations = [];
  let liveStatusMap = {};
  let liveUpdatedAt = null;

  const statusBox = document.getElementById("statusBox");
  const latInput = document.getElementById("latInput");
  const lngInput = document.getElementById("lngInput");
  const radiusInput = document.getElementById("radiusInput");
  const brandFilter = document.getElementById("brandFilter");
  const resultList = document.getElementById("resultList");
  const countBadge = document.getElementById("countBadge");
  const summaryText = document.getElementById("summaryText");
  const coordText = document.getElementById("coordText");

  function showToast(msg) {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.style.display = "block";
    clearTimeout(window.__toastTimer);
    window.__toastTimer = setTimeout(() => {
      t.style.display = "none";
    }, 2200);
  }

  async function copyText(text) {
    try {
      await navigator.clipboard.writeText(text || "");
      showToast("คัดลอกแล้ว: " + text);
    } catch (_) {
      showToast("คัดลอกไม่สำเร็จ");
    }
  }

  function setStatus(message, type = "") {
    statusBox.className = "status" + (type ? " " + type : "");
    statusBox.textContent = message;
  }

  function showBox(id, message) {
    const el = document.getElementById(id);
    if (!el) return;
    el.style.display = message ? "block" : "none";
    el.textContent = message || "";
  }

  function updateDashboard(found = 0, searchStatus = "Ready") {
    const now = new Date();
    const stamp = now.toLocaleString("th-TH");
    const radiusKm = (Number(radiusInput.value || 5000) / 1000).toString() + " กม.";

    document.getElementById("heroUpdated").textContent = stamp;
    document.getElementById("heroSearchStatus").textContent = searchStatus;
    document.getElementById("heroFound").textContent = String(found);
    document.getElementById("heroRadius").textContent = radiusKm;

    document.getElementById("summaryUpdated").textContent = stamp;
    document.getElementById("summarySearch").textContent = searchStatus;
    document.getElementById("summaryFound").textContent = found + " ปั๊ม";

    document.getElementById("headerUpdated").textContent = "Updated: " + stamp;
    document.getElementById("headerFound").textContent = "Found: " + found;
  }

  function updateCoordText() {
    coordText.textContent = `พิกัดปัจจุบัน: ${currentLat.toFixed(6)}, ${currentLng.toFixed(6)}`;
    latInput.value = currentLat.toFixed(6);
    lngInput.value = currentLng.toFixed(6);
  }

  function escapeHtml(text) {
    return String(text ?? "")
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#039;");
  }

  function escapeJsString(text) {
    return String(text ?? "")
      .replaceAll("\\", "\\\\")
      .replaceAll("'", "\\'")
      .replaceAll("\n", " ")
      .replaceAll("\r", " ");
  }

  function normalizeBrand(value = "") {
    const text = String(value).toLowerCase().trim();
    if (text === "ptt") return "ptt";
    if (text === "bangchak") return "bangchak";
    if (text === "shell") return "shell";
    if (text === "esso") return "esso";
    if (text === "caltex") return "caltex";
    if (text === "pt") return "pt";
    if (text === "susco") return "susco";
    if (text === "irpc") return "irpc";
    return "other";
  }

  function brandLabel(brandKey, stationName) {
    const map = {
      ptt: "PTT",
      bangchak: "Bangchak",
      shell: "Shell",
      esso: "Esso",
      caltex: "Caltex",
      pt: "PT",
      susco: "Susco",
      irpc: "IRPC",
      other: stationName || "อื่น ๆ"
    };
    return map[brandKey] || "อื่น ๆ";
  }

  function haversineKm(lat1, lon1, lat2, lon2) {
    const toRad = deg => deg * Math.PI / 180;
    const R = 6371;
    const dLat = toRad(lat2 - lat1);
    const dLon = toRad(lon2 - lon1);
    const a =
      Math.sin(dLat / 2) * Math.sin(dLat / 2) +
      Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) *
      Math.sin(dLon / 2) * Math.sin(dLon / 2);
    return 2 * R * Math.asin(Math.sqrt(a));
  }

  function dirLink(toLat, toLng) {
    return `https://www.google.com/maps/dir/?api=1&origin=${currentLat},${currentLng}&destination=${toLat},${toLng}&travelmode=driving`;
  }

  function fuelNowLinkGeneric(toLat, toLng) {
    return `https://fuel-now.doeb.go.th/?lat=${toLat}&lng=${toLng}&q=${encodeURIComponent("สถานีบริการน้ำมัน")}`;
  }

  function fuelNowLinkBrand(toLat, toLng, brandKey, stationName) {
    const brandText = brandLabel(brandKey, stationName);
    return `https://fuel-now.doeb.go.th/?lat=${toLat}&lng=${toLng}&q=${encodeURIComponent(brandText)}`;
  }

  async function openFuelSmart(name, lat, lng) {
    await copyText(name);
    showToast("คัดลอกชื่อปั๊มแล้ว → ไปวางในแท็บ Dashboard");
    const url = fuelNowLinkGeneric(lat, lng);
    setTimeout(() => {
      window.open(url, "_blank");
    }, 450);
  }

  async function openFuelSmartBrand(name, lat, lng, brandKey) {
    await copyText(name);
    showToast("คัดลอกชื่อปั๊มแล้ว → เปิด Fuel Now แบบแบรนด์");
    const url = fuelNowLinkBrand(lat, lng, brandKey, name);
    setTimeout(() => {
      window.open(url, "_blank");
    }, 450);
  }

  async function fetchWithTimeout(url, options = {}, timeoutMs = 15000) {
    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), timeoutMs);
    try {
      const res = await fetch(url, { ...options, signal: controller.signal });
      clearTimeout(timer);
      return res;
    } catch (err) {
      clearTimeout(timer);
      throw err;
    }
  }

  function initMap() {
    map = L.map("map", { zoomControl: true }).setView([DEFAULT_LAT, DEFAULT_LNG], 12);
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 19,
      attribution: "&copy; OpenStreetMap contributors"
    }).addTo(map);
    addUserMarker(currentLat, currentLng);
  }

  function clearMapMarkers() {
    mapMarkers.forEach(m => map.removeLayer(m));
    mapMarkers = [];
    if (userMarker) {
      map.removeLayer(userMarker);
      userMarker = null;
    }
  }

  function addUserMarker(lat, lng) {
    userMarker = L.marker([lat, lng]).addTo(map);
    userMarker.bindPopup("<b>ตำแหน่งของคุณ</b>");
  }

  function openFuelFromPopup(lat, lng, brandKey, encodedName) {
    const stationName = decodeURIComponent(encodedName || "");
    openFuelSmart(stationName, Number(lat), Number(lng));
  }

  function addStationMarkers(stations) {
    stations.forEach((s) => {
      const marker = L.marker([s.lat, s.lng]).addTo(map);
      marker.bindPopup(`
        <b>${escapeHtml(s.name)}</b><br>
        ระยะทาง: ${s.distanceKm.toFixed(2)} กม.<br>
        แบรนด์: ${escapeHtml(brandLabel(s.brand, s.name))}<br><br>
        <button onclick="openFuelFromPopup('${s.lat}','${s.lng}','${s.brand}','${encodeURIComponent(s.name)}')" style="padding:8px 10px;border:none;border-radius:8px;background:#2563eb;color:#fff;font-weight:700;cursor:pointer;">เปิด Dashboard</button>
      `);
      mapMarkers.push(marker);
    });

    if (stations.length > 0) {
      const bounds = L.latLngBounds(stations.map(s => [s.lat, s.lng]));
      bounds.extend([currentLat, currentLng]);
      map.fitBounds(bounds.pad(0.15));
    } else {
      map.setView([currentLat, currentLng], 13);
    }
  }

  async function loadStations() {
    try {
      setStatus("กำลังโหลดข้อมูลปั๊ม...", "");
      const res = await fetchWithTimeout(STATIONS_URL + "?t=" + Date.now(), {}, 15000);
      if (!res.ok) throw new Error("โหลด stations.json ไม่สำเร็จ: HTTP " + res.status);

      const data = await res.json();
      if (!Array.isArray(data)) throw new Error("stations.json ต้องเป็น array");

      allStations = data
        .map((item) => ({
          id: String(item.id || "").trim(),
          name: String(item.name || "").trim(),
          brand: normalizeBrand(item.brand || ""),
          brandLabel: String(item.brandLabel || "").trim(),
          lat: Number(item.lat),
          lng: Number(item.lng),
          address: String(item.address || "").trim(),
          province: String(item.province || "").trim(),
          district: String(item.district || "").trim()
        }))
        .filter(item =>
          item.id &&
          item.name &&
          Number.isFinite(item.lat) &&
          Number.isFinite(item.lng)
        );

      if (!allStations.length) {
        throw new Error("stations.json ไม่มีรายการที่มี id/name/lat/lng ครบ");
      }

      setStatus(`โหลดข้อมูลปั๊มสำเร็จ ${allStations.length} จุด`, "ok");
    } catch (err) {
      console.error(err);
      setStatus("โหลดข้อมูลปั๊มล้มเหลว", "error");
      resultList.innerHTML = `<div class="empty">${escapeHtml(err.message || "โหลด stations.json ไม่สำเร็จ")}</div>`;
    }
  }

  async function loadLiveStatusFile() {
    try {
      const res = await fetchWithTimeout(`${LIVE_STATUS_URL}?t=${Date.now()}`, {}, 15000);
      if (!res.ok) throw new Error(`โหลด live-status.json ไม่สำเร็จ: HTTP ${res.status}`);
      const data = await res.json();
      liveStatusMap = data?.stations || {};
      liveUpdatedAt = data?.updated_at || null;

      const liveCount = Object.keys(liveStatusMap).length;
      const stationCount = allStations.length;
      const meta = document.getElementById("liveMetaNote");

      if (meta) {
        meta.textContent =
          `หน้าเว็บนี้ใช้ stations.json สำหรับรายการ/พิกัด และอ่านสถานะจาก live-status.json ด้วย station.id ที่ต้องตรงกัน`
          + (liveUpdatedAt ? ` | ล่าสุด: ${new Date(liveUpdatedAt).toLocaleString("th-TH")}` : "")
          + ` | stations: ${stationCount} | live: ${liveCount}`;
      }

      return data;
    } catch (err) {
      console.error(err);
      liveStatusMap = {};
      liveUpdatedAt = null;
      return null;
    }
  }

  function fuelColor(v) {
    const text = String(v || "").trim();
    if (text === "ปกติ") return "#16a34a";
    if (text === "หมด") return "#dc2626";
    if (text === "ไม่ระบุ") return "#64748b";
    if (text === "ไม่พบข้อมูล") return "#64748b";
    return "#64748b";
  }

  function renderLiveBoxFromFile(station) {
    const live = liveStatusMap[station.id] || null;

    if (!live) {
      console.warn("NO LIVE DATA:", station.id);

      return `
        <div class="doeb-live-title">📊 สถานะน้ำมันปัจจุบัน</div>
        <div class="doeb-live-grid">
          <div class="fuel-pill" style="background:#64748b;">G95<br>ไม่พบข้อมูล</div>
          <div class="fuel-pill" style="background:#64748b;">Diesel<br>ไม่พบข้อมูล</div>
        </div>
        <div class="fuel-sub">ไม่พบ station.id นี้ใน live-status.json</div>
      `;
    }

    const noteText = live.note ? escapeHtml(live.note) : "";
    const matchedText =
      live.matched_name || live.matched_district || live.matched_province
        ? ` | match: ${escapeHtml(
            [live.matched_name, live.matched_district, live.matched_province]
              .filter(Boolean)
              .join(" / ")
          )}`
        : "";

    return `
      <div class="doeb-live-title">📊 สถานะน้ำมันปัจจุบัน</div>
      <div class="doeb-live-grid">
        <div class="fuel-pill" style="background:${fuelColor(live.g95)};">G95<br>${escapeHtml(live.g95 || "ไม่พบข้อมูล")}</div>
        <div class="fuel-pill" style="background:${fuelColor(live.diesel)};">Diesel<br>${escapeHtml(live.diesel || "ไม่พบข้อมูล")}</div>
      </div>
      <div class="fuel-sub">
        ${liveUpdatedAt ? `อัปเดต: ${escapeHtml(new Date(liveUpdatedAt).toLocaleString("th-TH"))}` : ""}
        ${noteText ? ` | ${noteText}` : ""}
        ${matchedText}
      </div>
    `;
  }

  async function findNearbyStations() {
    try {
      const inputLat = Number(latInput.value);
      const inputLng = Number(lngInput.value);

      if (!Number.isFinite(inputLat) || !Number.isFinite(inputLng)) {
        throw new Error("กรุณากด 'ใช้ตำแหน่งฉัน' หรือกรอกพิกัดก่อนค้นหา");
      }

      currentLat = inputLat;
      currentLng = inputLng;

      updateCoordText();
      updateDashboard(0, "Loading");
      setStatus("กำลังค้นหาปั๊มน้ำมันใกล้คุณ...", "");
      countBadge.textContent = "กำลังค้นหา...";
      summaryText.textContent = "กำลังโหลดผลลัพธ์";

      const radius = Number(radiusInput.value || 5000);
      const selectedBrand = brandFilter.value;

      filteredStations = allStations
        .map((station) => ({
          ...station,
          distanceKm: haversineKm(currentLat, currentLng, station.lat, station.lng)
        }))
        .filter((station) => station.distanceKm * 1000 <= radius)
        .filter((station) => selectedBrand === "all" ? true : station.brand === selectedBrand)
        .sort((a, b) => a.distanceKm - b.distanceKm);

      clearMapMarkers();
      addUserMarker(currentLat, currentLng);
      addStationMarkers(filteredStations);
      renderStations(filteredStations);

      countBadge.textContent = `${filteredStations.length} ปั๊ม`;
      summaryText.textContent = filteredStations.length
        ? `พบ ${filteredStations.length} ปั๊มจาก stations.json ตามระยะจริง`
        : "ไม่พบปั๊มในระยะที่กำหนด";

      setStatus(`ค้นหาสำเร็จ พบ ${filteredStations.length} ปั๊ม`, "ok");
      updateDashboard(filteredStations.length, "Ready");
    } catch (err) {
      console.error(err);
      resultList.innerHTML = `<div class="empty">${escapeHtml(err.message || "เกิดข้อผิดพลาด")}</div>`;
      countBadge.textContent = "0 ปั๊ม";
      summaryText.textContent = "ยังโหลดผลลัพธ์ไม่ได้";
      setStatus("ค้นหาล้มเหลว", "warn");
      updateDashboard(0, "Error");
    }
  }

  function renderStations(stations) {
    resultList.innerHTML = "";

    if (!stations.length) {
      resultList.innerHTML = `<div class="empty">ไม่มีผลลัพธ์ในตอนนี้</div>`;
      return;
    }

    stations.forEach((s) => {
      const dirUrl = dirLink(s.lat, s.lng);
      const copyNameJs = escapeJsString(s.name);
      const liveBoxHtml = renderLiveBoxFromFile(s);

      const el = document.createElement("div");
      el.className = "station";
      el.innerHTML = `
        <div class="station-top">
          <div class="station-name">${escapeHtml(s.name)}</div>
          <div class="distance">${s.distanceKm.toFixed(2)} กม.</div>
        </div>

        <div class="brand-row">
          <div class="brand-badge">${escapeHtml(brandLabel(s.brand, s.name))}</div>
          <div class="brand-badge">ID: ${escapeHtml(s.id)}</div>
        </div>

        <div class="meta">
          ที่อยู่: ${escapeHtml(s.address || "-")}<br>
          จังหวัด: ${escapeHtml(s.province || "-")}<br>
          อำเภอ: ${escapeHtml(s.district || "-")}<br>
          พิกัด: ${s.lat.toFixed(6)}, ${s.lng.toFixed(6)}<br>
          สถานะน้ำมันบนเว็บนี้: อ่านจาก live-status.json ตาม station.id
        </div>

        <div class="action-row">
          <a class="btn-link secondary" href="${dirUrl}" target="_blank" rel="noopener noreferrer">นำทาง</a>
          <button class="btn-link" type="button" onclick="openFuelSmart('${copyNameJs}', ${s.lat}, ${s.lng})">เปิด Dashboard</button>
          <button class="btn-link" type="button" onclick="openFuelSmartBrand('${copyNameJs}', ${s.lat}, ${s.lng}, '${s.brand}')">เปิดแบบแบรนด์</button>
        </div>

        <div class="helper-box">
          <div class="helper-title">⚡ Smart Search (Dashboard)</div>
          <div class="helper-text">กดปุ่มด้านบน ระบบจะคัดลอกชื่อปั๊มให้ทันที แล้วเปิด Fuel Now จากนั้นไปที่แท็บ Dashboard แล้ววางชื่อปั๊มได้เลย</div>
          <div class="helper-name">${escapeHtml(s.name)}</div>

          <div class="helper-actions">
            <button class="mini-btn" type="button" onclick="copyText('${copyNameJs}')">📋 Copy ชื่อปั๊ม</button>
            <button class="mini-btn" type="button" onclick="copyText('${escapeJsString(s.province || "")}')">จังหวัด</button>
            <button class="mini-btn" type="button" onclick="copyText('${escapeJsString(s.district || "")}')">อำเภอ</button>
            <button class="mini-btn green" type="button" onclick="copyText('${escapeJsString(s.id)}')">Copy ID</button>
          </div>
        </div>

        <div class="doeb-live-box" id="fuel-${s.id}">
          ${liveBoxHtml}
        </div>
      `;
      resultList.appendChild(el);
    });
  }

  async function sendToTelegram() {
    showBox("feedbackError", "");
    showBox("feedbackOk", "");

    const senderName = document.getElementById("senderName").value.trim() || "Anonymous";
    const senderMessage = document.getElementById("senderMessage").value.trim();

    if (!senderMessage) {
      showBox("feedbackError", "กรุณากรอกข้อความก่อน");
      return;
    }

    if (
      BOT_TOKEN === "PUT_YOUR_BOT_TOKEN_HERE" ||
      CHAT_ID === "PUT_YOUR_CHAT_ID_HERE"
    ) {
      showBox("feedbackError", "กรุณาใส่ BOT_TOKEN และ CHAT_ID ใน index.html ก่อน");
      return;
    }

    const text =
`📩 New Message from Fuel Finder

Sender: ${senderName}
Message: ${senderMessage}
Page: ${window.location.href}
Coordinates: ${currentLat.toFixed(6)}, ${currentLng.toFixed(6)}`;

    const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
    const btn = document.getElementById("sendTelegramBtn");
    btn.disabled = true;
    btn.textContent = "กำลังส่ง...";

    try {
      const res = await fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ chat_id: CHAT_ID, text })
      });

      const data = await res.json();
      if (!res.ok || !data.ok) {
        throw new Error(data.description || `HTTP ${res.status}`);
      }

      document.getElementById("senderMessage").value = "";
      showBox("feedbackOk", "ส่งข้อความสำเร็จ");
    } catch (err) {
      console.error(err);
      showBox("feedbackError", "ส่งข้อความไม่สำเร็จ\n" + (err.message || String(err)));
    } finally {
      btn.disabled = false;
      btn.textContent = "ส่งข้อความ";
    }
  }

  function useBrowserGPS() {
    if (!navigator.geolocation) {
      setStatus("อุปกรณ์นี้ไม่รองรับ GPS", "warn");
      return;
    }

    setStatus("กำลังขอตำแหน่งจากอุปกรณ์...", "");

    navigator.geolocation.getCurrentPosition(
      (pos) => {
        currentLat = pos.coords.latitude;
        currentLng = pos.coords.longitude;
        updateCoordText();
        clearMapMarkers();
        addUserMarker(currentLat, currentLng);
        map.setView([currentLat, currentLng], 13);
        setStatus("ใช้ตำแหน่งจากอุปกรณ์สำเร็จ กดค้นหาปั๊มใกล้ฉันต่อได้เลย", "ok");
      },
      (err) => {
        console.error("GPS error:", err);
        setStatus("ดึงตำแหน่งไม่สำเร็จ กรุณาอนุญาตการเข้าถึงตำแหน่ง หรือกด 'ใช้กรุงเทพ' เอง", "warn");
      },
      { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
    );
  }

  function setupBottomNav() {
    const navButtons = document.querySelectorAll(".nav-btn");
    navButtons.forEach(btn => {
      btn.addEventListener("click", () => {
        navButtons.forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        const targetId = btn.getAttribute("data-target");
        const target = document.getElementById(targetId);
        if (target) target.scrollIntoView({ behavior: "smooth", block: "start" });
      });
    });
  }

  document.addEventListener("DOMContentLoaded", async () => {
    initMap();
    updateCoordText();
    updateDashboard(0, "Ready");
    setupBottomNav();

    await loadStations();
    await loadLiveStatusFile();

    document.getElementById("gpsBtn").addEventListener("click", useBrowserGPS);
    document.getElementById("findBtn").addEventListener("click", findNearbyStations);
    document.getElementById("sendTelegramBtn").addEventListener("click", sendToTelegram);

    document.getElementById("bkkBtn").addEventListener("click", async () => {
      currentLat = DEFAULT_LAT;
      currentLng = DEFAULT_LNG;
      updateCoordText();
      clearMapMarkers();
      addUserMarker(currentLat, currentLng);
      map.setView([currentLat, currentLng], 12);
      setStatus("ใช้พิกัดกรุงเทพแล้ว", "ok");
      await findNearbyStations();
    });

    radiusInput.addEventListener("change", () => {
      const radiusKm = (Number(radiusInput.value || 5000) / 1000).toString() + " กม.";
      document.getElementById("heroRadius").textContent = radiusKm;
    });
  });

  window.openFuelFromPopup = openFuelFromPopup;
  window.copyText = copyText;
